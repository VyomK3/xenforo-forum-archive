# /etc/nginx/sites-available/ forum.site
server {
    listen 80;
    listen [::]:80;
    server_name forum.site;
    # certbot will add the :443 server block and redirect for you

    # Avatars: straight from disk, never touch Python
    location /forum_assets/ {
        alias /home/username/www/forum/forum_assets/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Real-IP $remote_addr;

        # The archive is read-only, so cached pages stay valid until you
        # rebuild the DB (then: restart app + wipe this cache).
        proxy_cache xenforo;
        proxy_cache_key $scheme$host$uri$is_args$args;
        proxy_cache_valid 200 24h;
        proxy_cache_valid 404 10m;
        # Serve a stale copy instead of an error if the app is restarting
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503;
        proxy_cache_lock on;
        add_header X-Cache-Status $upstream_cache_status;
    }
}
