# /etc/nginx/conf.d/archiver-cache.conf
# Cache zone for the read-only archive. 200MB of hot pages on disk,
# metadata for ~80k cached pages in 10MB of RAM.
proxy_cache_path /var/cache/nginx/archiver levels=1:2
                 keys_zone=archiver:10m max_size=200m inactive=7d
                 use_temp_path=off;
